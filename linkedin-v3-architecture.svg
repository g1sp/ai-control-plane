  <text x="1034" y="360" class="sans" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Redis-Backed Rate Limiter</text>
  <line x1="733" y1="366" x2="1335" y2="366" stroke="#fca5a5" stroke-width="0.8" opacity="0.5"/>
  <text x="1034" y="382" class="sans" font-size="10" fill="#fca5a5" text-anchor="middle">Sliding window via Redis sorted sets  •  Multi-instance safe</text>
  <text x="1034" y="398" class="sans" font-size="10" fill="#fecaca" text-anchor="middle">Automatic fallback to in-memory when Redis unavailable</text>
  <text x="1034" y="413" class="sans" font-size="10" fill="#fecaca" text-anchor="middle">Per-minute  /  per-hour  /  per-day  windows  •  Per-user isolation</text>
  <rect x="723" y="424" width="185" height="18" rx="4" fill="#7f1d1d"/>
  <text x="816" y="437" class="sans" font-size="9" fill="#fca5a5" text-anchor="middle">RATE_LIMIT_BACKEND=redis</text>
