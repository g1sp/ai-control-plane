  <line x1="60" y1="200" x2="1340" y2="200" stroke="#fca5a5" stroke-width="1"/>

  <!-- ── Row 1: 3 module boxes ── -->
  <!-- Box 1: ML Threat Detection -->
  <rect x="45" y="210" width="418" height="112" rx="7" fill="#991b1b"/>
  <text x="254" y="232" class="sans" font-size="14" font-weight="bold" fill="white" text-anchor="middle">ML Threat Detection</text>
  <line x1="65" y1="238" x2="443" y2="238" stroke="#fca5a5" stroke-width="0.8" opacity="0.5"/>
  <text x="254" y="254" class="sans" font-size="10" fill="#fca5a5" text-anchor="middle">TF-IDF Cosine Similarity Classifier  •  &lt;5ms  •  No external APIs</text>
  <text x="254" y="272" class="sans" font-size="10" fill="#fecaca" text-anchor="middle">Prompt Injection  |  Jailbreak  |  PII Exfiltration</text>
  <text x="254" y="287" class="sans" font-size="10" fill="#fecaca" text-anchor="middle">Credential Theft  |  Indirect Injection</text>
  <rect x="55" y="295" width="120" height="18" rx="4" fill="#7f1d1d"/>
  <text x="115" y="308" class="sans" font-size="9" fill="#fca5a5" text-anchor="middle">Score: 0.0 → 1.0</text>
  <rect x="185" y="295" width="130" height="18" rx="4" fill="#7f1d1d"/>
  <text x="250" y="308" class="sans" font-size="9" fill="#fca5a5" text-anchor="middle">block  /  escalate  /  pass</text>
  <rect x="325" y="295" width="128" height="18" rx="4" fill="#7f1d1d"/>
  <text x="389" y="308" class="sans" font-size="9" fill="#fca5a5" text-anchor="middle">5 threat categories</text>

  <!-- Box 2: Policy-as-Code -->
  <rect x="491" y="210" width="418" height="112" rx="7" fill="#991b1b"/>
  <text x="700" y="232" class="sans" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Policy-as-Code  (YAML DSL)</text>
  <line x1="511" y1="238" x2="889" y2="238" stroke="#fca5a5" stroke-width="0.8" opacity="0.5"/>
  <text x="700" y="254" class="sans" font-size="10" fill="#fca5a5" text-anchor="middle">Declarative YAML rules  •  Hot reload  •  No code deploys</text>
  <text x="700" y="272" class="sans" font-size="10" fill="#fecaca" text-anchor="middle">Triggers:  input  |  pre_execution  |  tool_call</text>
  <text x="700" y="287" class="sans" font-size="10" fill="#fecaca" text-anchor="middle">Actions:  block  |  escalate  |  allow</text>
  <rect x="501" y="295" width="120" height="18" rx="4" fill="#7f1d1d"/>
  <text x="561" y="308" class="sans" font-size="9" fill="#fca5a5" text-anchor="middle">risk_score in rules</text>
  <rect x="631" y="295" width="130" height="18" rx="4" fill="#7f1d1d"/>
  <text x="696" y="308" class="sans" font-size="9" fill="#fca5a5" text-anchor="middle">watches policies/ dir</text>
  <rect x="771" y="295" width="128" height="18" rx="4" fill="#7f1d1d"/>
  <text x="835" y="308" class="sans" font-size="9" fill="#fca5a5" text-anchor="middle">safe eval sandbox</text>

  <!-- Box 3: AES-256-GCM Encryption -->
