  <line x1="60" y1="196" x2="1340" y2="196" stroke="#c7d2fe" stroke-width="1"/>

  <!-- Module 1: ML Threat Detection -->
  <rect x="45" y="206" width="418" height="114" rx="6" fill="#312e81"/>
  <text x="254" y="228" class="sans" font-size="13" font-weight="bold" fill="#e0e7ff" text-anchor="middle">ML Threat Detection</text>
  <line x1="65" y1="234" x2="443" y2="234" stroke="#4338ca" stroke-width="0.8"/>
  <text x="254" y="252" class="sans" font-size="10" fill="#a5b4fc" text-anchor="middle">TF-IDF Cosine Similarity Classifier  •  &lt;5ms  •  No external APIs</text>
  <text x="254" y="268" class="sans" font-size="10" fill="#c7d2fe" text-anchor="middle">Prompt Injection  |  Jailbreak  |  PII Exfiltration</text>
  <text x="254" y="283" class="sans" font-size="10" fill="#c7d2fe" text-anchor="middle">Credential Theft  |  Indirect Injection</text>
  <rect x="55" y="294" width="118" height="17" rx="3" fill="#1e1b4b"/>
  <text x="114" y="306" class="sans" font-size="9" fill="#a5b4fc" text-anchor="middle">Score: 0.0 → 1.0</text>
  <rect x="183" y="294" width="128" height="17" rx="3" fill="#1e1b4b"/>
  <text x="247" y="306" class="sans" font-size="9" fill="#a5b4fc" text-anchor="middle">block  /  escalate  /  pass</text>
  <rect x="321" y="294" width="130" height="17" rx="3" fill="#1e1b4b"/>
  <text x="386" y="306" class="sans" font-size="9" fill="#a5b4fc" text-anchor="middle">5 threat categories</text>

  <!-- Module 2: Policy-as-Code -->
  <rect x="491" y="206" width="418" height="114" rx="6" fill="#312e81"/>
  <text x="700" y="228" class="sans" font-size="13" font-weight="bold" fill="#e0e7ff" text-anchor="middle">Policy-as-Code  (YAML DSL)</text>
  <line x1="511" y1="234" x2="889" y2="234" stroke="#4338ca" stroke-width="0.8"/>
  <text x="700" y="252" class="sans" font-size="10" fill="#a5b4fc" text-anchor="middle">Declarative YAML rules  •  Hot reload  •  No code deploys</text>
  <text x="700" y="268" class="sans" font-size="10" fill="#c7d2fe" text-anchor="middle">Triggers:  input  |  pre_execution  |  tool_call</text>
  <text x="700" y="283" class="sans" font-size="10" fill="#c7d2fe" text-anchor="middle">Actions:  block  |  escalate  |  allow</text>
  <rect x="501" y="294" width="118" height="17" rx="3" fill="#1e1b4b"/>
  <text x="560" y="306" class="sans" font-size="9" fill="#a5b4fc" text-anchor="middle">risk_score in rules</text>
  <rect x="629" y="294" width="128" height="17" rx="3" fill="#1e1b4b"/>
  <text x="693" y="306" class="sans" font-size="9" fill="#a5b4fc" text-anchor="middle">watches policies/ dir</text>
  <rect x="767" y="294" width="130" height="17" rx="3" fill="#1e1b4b"/>
  <text x="832" y="306" class="sans" font-size="9" fill="#a5b4fc" text-anchor="middle">safe eval sandbox</text>

  <!-- Module 3: AES-256-GCM -->
  <rect x="937" y="206" width="418" height="114" rx="6" fill="#312e81"/>
  <text x="1146" y="228" class="sans" font-size="13" font-weight="bold" fill="#e0e7ff" text-anchor="middle">AES-256-GCM Audit Encryption</text>
  <line x1="957" y1="234" x2="1335" y2="234" stroke="#4338ca" stroke-width="0.8"/>
  <text x="1146" y="252" class="sans" font-size="10" fill="#a5b4fc" text-anchor="middle">Tamper-evident encrypted audit log</text>
  <text x="1146" y="268" class="sans" font-size="10" fill="#c7d2fe" text-anchor="middle">Encrypted at write  •  Unique nonce per record</text>
  <text x="1146" y="283" class="sans" font-size="10" fill="#c7d2fe" text-anchor="middle">GCM auth tag detects tampering  •  Key rotation API</text>
  <rect x="947" y="294" width="128" height="17" rx="3" fill="#1e1b4b"/>
  <text x="1011" y="306" class="sans" font-size="9" fill="#a5b4fc" text-anchor="middle">enc_v1: prefix</text>
  <rect x="1085" y="294" width="140" height="17" rx="3" fill="#1e1b4b"/>
  <text x="1155" y="306" class="sans" font-size="9" fill="#a5b4fc" text-anchor="middle">compliance endpoint</text>
  <rect x="1235" y="294" width="108" height="17" rx="3" fill="#1e1b4b"/>
  <text x="1289" y="306" class="sans" font-size="9" fill="#a5b4fc" text-anchor="middle">/admin/rekey</text>

  <!-- Module 4: Human-in-the-Loop -->
  <rect x="45" y="334" width="640" height="112" rx="6" fill="#312e81"/>
  <text x="365" y="356" class="sans" font-size="13" font-weight="bold" fill="#e0e7ff" text-anchor="middle">Human-in-the-Loop Escalation</text>
  <line x1="65" y1="362" x2="665" y2="362" stroke="#4338ca" stroke-width="0.8"/>
  <text x="365" y="378" class="sans" font-size="10" fill="#a5b4fc" text-anchor="middle">Policy ESCALATE rules → review queue → human decision → proceed or deny</text>
  <text x="365" y="394" class="sans" font-size="10" fill="#c7d2fe" text-anchor="middle">Timeout configurable (default: deny)  •  Full decision audit trail</text>
  <text x="365" y="408" class="sans" font-size="10" fill="#c7d2fe" text-anchor="middle">Context preserved: user  /  tool  /  risk score  /  policy message</text>
  <rect x="55" y="420" width="182" height="17" rx="3" fill="#1e1b4b"/>
  <text x="146" y="432" class="sans" font-size="9" fill="#a5b4fc" text-anchor="middle">GET /escalations/pending</text>
  <rect x="247" y="420" width="200" height="17" rx="3" fill="#1e1b4b"/>
  <text x="347" y="432" class="sans" font-size="9" fill="#a5b4fc" text-anchor="middle">POST /escalations/{id}/decide</text>
  <rect x="457" y="420" width="218" height="17" rx="3" fill="#1e1b4b"/>
  <text x="566" y="432" class="sans" font-size="9" fill="#a5b4fc" text-anchor="middle">fail-safe  |  fail-open  (configurable)</text>

  <!-- Module 5: Redis Rate Limiter -->
  <rect x="713" y="334" width="642" height="112" rx="6" fill="#312e81"/>
  <text x="1034" y="356" class="sans" font-size="13" font-weight="bold" fill="#e0e7ff" text-anchor="middle">Redis-Backed Rate Limiter</text>
  <line x1="733" y1="362" x2="1335" y2="362" stroke="#4338ca" stroke-width="0.8"/>
  <text x="1034" y="378" class="sans" font-size="10" fill="#a5b4fc" text-anchor="middle">Sliding window via Redis sorted sets  •  Multi-instance safe</text>
  <text x="1034" y="394" class="sans" font-size="10" fill="#c7d2fe" text-anchor="middle">Automatic fallback to in-memory when Redis unavailable</text>
  <text x="1034" y="408" class="sans" font-size="10" fill="#c7d2fe" text-anchor="middle">Per-minute  /  per-hour  /  per-day  windows  •  Per-user isolation</text>
  <rect x="723" y="420" width="182" height="17" rx="3" fill="#1e1b4b"/>
  <text x="814" y="432" class="sans" font-size="9" fill="#a5b4fc" text-anchor="middle">RATE_LIMIT_BACKEND=redis</text>
  <rect x="915" y="420" width="168" height="17" rx="3" fill="#1e1b4b"/>
  <text x="999" y="432" class="sans" font-size="9" fill="#a5b4fc" text-anchor="middle">sorted set per user/window</text>
  <rect x="1093" y="420" width="252" height="17" rx="3" fill="#1e1b4b"/>
  <text x="1219" y="432" class="sans" font-size="9" fill="#a5b4fc" text-anchor="middle">stays functional if Redis drops</text>

