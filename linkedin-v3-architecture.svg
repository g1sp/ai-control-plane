  <text x="1146" y="232" class="sans" font-size="14" font-weight="bold" fill="white" text-anchor="middle">AES-256-GCM Audit Encryption</text>
  <line x1="957" y1="238" x2="1335" y2="238" stroke="#fca5a5" stroke-width="0.8" opacity="0.5"/>
  <text x="1146" y="254" class="sans" font-size="10" fill="#fca5a5" text-anchor="middle">Tamper-evident encrypted audit log</text>
  <text x="1146" y="272" class="sans" font-size="10" fill="#fecaca" text-anchor="middle">Encrypted at write  •  Unique nonce per record</text>
  <text x="1146" y="287" class="sans" font-size="10" fill="#fecaca" text-anchor="middle">GCM auth tag detects tampering  •  Key rotation API</text>
  <rect x="947" y="295" width="140" height="18" rx="4" fill="#7f1d1d"/>
  <text x="1017" y="308" class="sans" font-size="9" fill="#fca5a5" text-anchor="middle">enc_v1: prefix</text>
  <rect x="1097" y="295" width="140" height="18" rx="4" fill="#7f1d1d"/>
  <text x="1167" y="308" class="sans" font-size="9" fill="#fca5a5" text-anchor="middle">compliance endpoint</text>
  <rect x="1247" y="295" width="98" height="18" rx="4" fill="#7f1d1d"/>
  <text x="1296" y="308" class="sans" font-size="9" fill="#fca5a5" text-anchor="middle">/admin/rekey</text>

  <!-- ── Row 2: 2 module boxes ── -->
  <!-- Box 4: Human-in-the-Loop Escalation -->
  <rect x="45" y="338" width="640" height="112" rx="7" fill="#991b1b"/>
  <text x="365" y="360" class="sans" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Human-in-the-Loop Escalation</text>
  <line x1="65" y1="366" x2="665" y2="366" stroke="#fca5a5" stroke-width="0.8" opacity="0.5"/>
  <text x="365" y="382" class="sans" font-size="10" fill="#fca5a5" text-anchor="middle">Policy ESCALATE rules → review queue → human decision → proceed or deny</text>
  <text x="365" y="398" class="sans" font-size="10" fill="#fecaca" text-anchor="middle">Timeout: configurable (default: deny)  •  Full decision audit trail</text>
  <text x="365" y="413" class="sans" font-size="10" fill="#fecaca" text-anchor="middle">Context preserved: user  /  tool  /  risk score  /  policy message</text>
  <rect x="55" y="424" width="185" height="18" rx="4" fill="#7f1d1d"/>
  <text x="148" y="437" class="sans" font-size="9" fill="#fca5a5" text-anchor="middle">GET /escalations/pending</text>
  <rect x="250" y="424" width="205" height="18" rx="4" fill="#7f1d1d"/>
  <text x="353" y="437" class="sans" font-size="9" fill="#fca5a5" text-anchor="middle">POST /escalations/{id}/decide</text>
  <rect x="465" y="424" width="210" height="18" rx="4" fill="#7f1d1d"/>
  <text x="570" y="437" class="sans" font-size="9" fill="#fca5a5" text-anchor="middle">fail-safe  |  fail-open  (configurable)</text>

  <!-- Box 5: Redis Rate Limiter -->
