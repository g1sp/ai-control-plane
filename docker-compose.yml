version: '3.9'

services:
  gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: policy-gateway
    ports:
      - "8000:8000"
    environment:
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      GATEWAY_MODE: ${GATEWAY_MODE:-local}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: sqlite:////app/data/audit.db
      OLLAMA_HOST: http://ollama:11434
      # v3 Safety & Governance
      AUDIT_ENCRYPTION_KEY: ${AUDIT_ENCRYPTION_KEY:-}
      RATE_LIMIT_BACKEND: ${RATE_LIMIT_BACKEND:-memory}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      ESCALATION_TIMEOUT_SECONDS: ${ESCALATION_TIMEOUT_SECONDS:-300}
      ESCALATION_TIMEOUT_ACTION: ${ESCALATION_TIMEOUT_ACTION:-deny}
    volumes:
      - ./data:/app/data
      - ./backend/policies:/app/policies
    depends_on:
      - ollama
      - redis
    networks:
      - gateway-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    networks:
      - gateway-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  ollama:
    image: ollama/ollama:latest
    container_name: ollama-server
    ports:
      - "11434:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    volumes:
      - ./models:/root/.ollama
    networks:
      - gateway-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  gateway-network:
    driver: bridge

volumes:
  data:
